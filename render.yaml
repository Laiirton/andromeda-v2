services:
  - type: web # Web Service (plano free disponível)
    name: andromeda-v2
    runtime: node
    region: oregon
    plan: free

    # Instala dependências do Chromium/Puppeteer no Linux
    buildCommand: |
      apt-get update && apt-get install -y \
        ca-certificates fonts-liberation libatk-bridge2.0-0 libatk1.0-0 \
        libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 \
        libgbm1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 \
        libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 \
        libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 \
        libxi6 libxrandr2 libxrender1 libxss1 libxtst6 lsb-release wget \
        xdg-utils --no-install-recommends && \
      npm install

    startCommand: npm start

    # Porta exposta pelo servidor de health check (src/core/healthServer.js)
    # O Render usa essa rota para verificar se o serviço está saudável
    healthCheckPath: /health

    envVars:
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false # Preencha no painel do Render → Environment
      - key: SUPABASE_SERVICE_KEY
        sync: false # Preencha no painel do Render → Environment
      - key: NODE_ENV
        value: production

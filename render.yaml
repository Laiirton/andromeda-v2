services:
  - type: web
    name: andromeda-v2
    env: docker # Usa o Dockerfile na raiz do projeto
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
